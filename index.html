<body>
  <header class="topbar" data-app-navigation>
    <a class="brand" href="#/home" aria-label="Bibliotheque Digitale home">
      <span class="brand-avatar"><img src="assets/avatar-cecilia.png" alt="Cécilia, fondatrice de Bibliothèque Digitale"></span>
      <strong><em>Bibliothèque</em><small>Digitale</small></strong>
    </a>
    <nav class="public-nav" aria-label="Navigation principale">
      <a href="#/home">Accueil</a>
      <a href="#/shop">Bibliothèque PLR</a>
      <a href="#/login" class="public-login">Espace client</a>
    </nav>
    <nav class="portal-nav" aria-label="Customer portal">
      <a href="#/home" class="storefront-link"><b>↗</b><span>Site Bibliothèque Digitale</span></a>
      <a href="#/library"><b>01</b><span>Home</span></a>
      <a href="#/products"><b>02</b><span>My products</span></a>
      <a href="#/shop"><b>03</b><span>Shop</span><em>New</em></a>
      <a href="#/community"><b>04</b><span>Community</span><em>Soon</em></a>
      <a href="#/profile"><b>05</b><span>My account</span></a>
      <a href="#/request-access"><b>+</b><span>Request access</span></a>
      <a href="#/admin" data-admin-link hidden><b>A</b><span>Admin</span></a>
    </nav>
    <div class="sidebar-account" data-sidebar-account hidden>
      <a href="#/profile" class="sidebar-profile">
        <span class="profile-initial" data-profile-initial>BD</span>
        <span><small>Signed in as</small><strong data-profile-name>Customer</strong></span>
      </a>
      <button class="ghost" type="button" data-sign-out hidden>Sign out</button>
    </div>
  </header>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <template id="auth-template">
    <section class="auth-card">
      <div class="auth-intro">
        <p class="eyebrow">Private Customer Library</p>
        <h1>Request access in one simple step.</h1>
        <p>New customer? Create your account and send your Etsy purchase details with one form. Once approved, your product and all its bonuses will appear in your library.</p>
        <ol class="simple-steps">
          <li><strong>Send your request</strong><span>Account and request are created together.</span></li>
          <li><strong>We verify your Etsy purchase</strong><span>Your request is reviewed manually.</span></li>
          <li><strong>Your product unlocks</strong><span>Sign in anytime to access your files and bonuses.</span></li>
        </ol>
      </div>
      <div class="auth-actions">
        <form data-onboarding-form class="panel onboarding-panel">
          <p class="eyebrow">New customer</p>
          <h2>Create my access request</h2>
          <label>First name
            <input name="first_name" type="text" autocomplete="given-name" required placeholder="Example: Candy">
          </label>
          <label>Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>Create a password
            <input name="password" type="password" autocomplete="new-password" required minlength="6">
          </label>
          <label>Product purchased
            <select name="product_slug" required data-onboarding-products></select>
          </label>
          <label>Etsy order number
            <input name="etsy_order_number" required placeholder="Example: 1234567890">
          </label>
          <label>Etsy email or buyer name
            <input name="etsy_buyer_info" required placeholder="Email, username, or buyer name">
          </label>
          <label>Notes <span class="optional">(optional)</span>
            <textarea name="notes" placeholder="Anything that helps verify your purchase"></textarea>
          </label>
          <button type="submit" class="rose full-button">Create account &amp; request access</button>
          <p class="form-note" data-onboarding-message></p>
        </form>

        <form data-auth-form class="panel signin-panel">
          <div>
            <p class="eyebrow">Already registered?</p>
            <h3>Sign in to my library</h3>
          </div>
          <label>Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="current-password" required minlength="6">
          </label>
          <button class="auth-text-link" type="button" data-forgot-password>Forgot your password?</button>
          <button type="submit">Sign in</button>
          <p class="form-note" data-auth-message></p>

          <div class="password-recovery-request" data-password-recovery-request hidden>
            <div class="recovery-divider"><span>Reset password</span></div>
            <p>Enter your email address. We will send you a secure link to choose a new password.</p>
            <label>Email
              <input name="recovery_email" type="email" autocomplete="email">
            </label>
            <button class="rose" type="button" data-send-recovery>Send reset link</button>
            <p class="form-note" data-recovery-message></p>
          </div>
        </form>
      </div>
    </section>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js?v=20260511-secure-product-design-v2"></script>
  <script src="assets/app.js?v=20260723-branding-video"></script>

</html>
